name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scaffold-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Content JSON validity
        run: node scripts/check-content.mjs

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Production build
        run: npx vite build

      - name: Design tokens presence sanity
        run: |
          test -f styles/tokens.css || { echo "::error::styles/tokens.css is missing"; exit 1; }
          test -f styles/tokens-v2.css || { echo "::error::styles/tokens-v2.css is missing"; exit 1; }
          grep -q -- "--mint" styles/tokens-v2.css || { echo "::error::styles/tokens-v2.css is missing the --mint token (v2 palette)"; exit 1; }
          grep -q -- "--scrim" styles/tokens.css || { echo "::error::styles/tokens.css is missing the --scrim token (structural)"; exit 1; }
          test -f index.html || { echo "::error::index.html is missing"; exit 1; }
          echo "tokens.css (structural) + tokens-v2.css (--mint palette) present; index.html present."

      - name: Pass summary
        run: |
          echo "=================================================="
          echo " CI PASSED"
          echo " - npm ci installed dependencies"
          echo " - All /content *.json files parse"
          echo " - tsc --noEmit: no type errors"
          echo " - vitest run: all tests pass"
          echo " - vite build: production build succeeded"
          echo " - styles/tokens.css (structural) + tokens-v2.css (--mint palette) present"
          echo " - index.html present"
          echo "=================================================="
